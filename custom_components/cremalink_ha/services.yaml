brew:
  name: Brew Beverage
  description: Brew a beverage with an optional profile and parameter overrides.
  fields:
    beverage:
      name: Beverage
      description: Name of the beverage (e.g. "espresso", "cappuccino", "flat_white").
      required: true
      example: "espresso"
      selector:
        text:
    dsn:
      name: Device DSN
      description: Required when multiple Cremalink devices are configured.
      example: "MY_DEVICE_DSN"
      selector:
        text:
    profile:
      name: Recipe Profile
      description: Profile number whose saved recipe should be used before applying overrides.
      selector:
        number:
          min: 1
          max: 4
    coffee_ml:
      name: Coffee (ml)
      description: Coffee volume in ml (overrides profile recipe).
      selector:
        number:
          min: 20
          max: 300
          unit_of_measurement: ml
    milk_ml:
      name: Milk (ml)
      description: Milk volume in ml (overrides profile recipe).
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: ml
    water_ml:
      name: Water (ml)
      description: Water volume in ml (for americano, hot water, etc.).
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: ml
    temperature:
      name: Temperature
      description: "Temperature setting: 0=low, 1=medium, 2=high."
      selector:
        number:
          min: 0
          max: 2
    taste:
      name: Taste
      description: "Taste/strength: 0=extra mild, 1=mild, 2=normal, 3=strong, 4=extra strong."
      selector:
        number:
          min: 0
          max: 4
    aroma:
      name: Aroma
      description: "Aroma pre-brew: 0=off, 1=light, 2=medium, 3=strong."
      selector:
        number:
          min: 0
          max: 3
    foam_level:
      name: Foam Level
      description: "Milk foam level: 0=none through 4=max."
      selector:
        number:
          min: 0
          max: 4
    milk_temp:
      name: Milk Temperature
      description: "Milk temperature: 0=low, 1=medium, 2=high."
      selector:
        number:
          min: 0
          max: 2
    double_shot:
      name: Double Shot
      description: "Double-shot toggle: 0=off, 1=on."
      selector:
        number:
          min: 0
          max: 1
    milk_first:
      name: Milk First
      description: "Milk-first toggle: 0=off, 1=on."
      selector:
        number:
          min: 0
          max: 1
    pre_brew:
      name: Pre Brew
      description: "Pre-brew toggle: 0=off, 1=on."
      selector:
        number:
          min: 0
          max: 1
    ice_amount:
      name: Ice Amount
      description: Iced beverage intensity/amount value.
      selector:
        number:
          min: 0
          max: 5
    cups_count:
      name: Cups Count
      description: Number of cups to prepare.
      selector:
        number:
          min: 1
          max: 12
    grinder:
      name: Grinder / Bean Slot
      description: Grinder or bean hopper selection value when supported by the machine.
      selector:
        number:
          min: 0
          max: 6

run_command:
  name: Run Raw Command Alias
  description: Execute any command alias exposed by the selected Cremalink device map.
  fields:
    command:
      name: Command
      description: Command alias from the device map, for example "espresso", "stop", or a future maintenance command such as "rinse" if supported.
      required: true
      selector:
        text:
    dsn:
      name: Device DSN
      description: Required when multiple Cremalink devices are configured.
      example: "MY_DEVICE_DSN"
      selector:
        text:
